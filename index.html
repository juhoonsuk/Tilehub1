<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLink 재고링크</title>
<style>
:root{--green:#1D9E75;--green-dk:#0F6E56;--green-bg:#E1F5EE;--blue:#185FA5;--blue-bg:#E6F1FB;--amber:#BA7517;--amber-bg:#FAEEDA;--purple:#534AB7;--purple-bg:#EEEDFE;--red:#A32D2D;--red-bg:#FCEBEB;--gray:#F5F5F4;--border:#e2e2df;--text:#1a1a18;--text2:#6b6b68;--text3:#9b9b98;--white:#fff;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans KR','PingFang SC',sans-serif;font-size:14px;color:var(--text);background:var(--gray)}
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lc{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.lh{padding:28px 28px 20px;text-align:center;border-bottom:1px solid var(--border)}
.logo{font-size:22px;font-weight:700}.logo span{color:var(--green)}
.lsub{font-size:12px;color:var(--text2);margin-top:4px}
.lb{padding:24px 28px}
.ltabs{display:flex;background:var(--gray);border-radius:var(--r);padding:3px;margin-bottom:20px}
.ltab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;border-radius:6px;color:var(--text2)}
.ltab.on{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fr{margin-bottom:12px}
.fl{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.fi{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--white);color:var(--text)}
.fi:focus{outline:none;border-color:var(--green)}
.btnl{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.btnl:hover{background:var(--green-dk)}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.lhint{font-size:11px;color:var(--text3);text-align:center;margin-top:8px}
.langr{display:flex;justify-content:center;gap:8px;padding:14px;border-top:1px solid var(--border)}
.langb{padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:transparent;font-size:11px;cursor:pointer;font-family:inherit;color:var(--text2)}
.langb.on{background:var(--gray);color:var(--text);font-weight:600}
.app{display:none;flex-direction:column;height:100vh}
.app.show{display:flex}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0}
.tlogo{font-size:16px;font-weight:700}.tlogo span{color:var(--green)}
.uchip{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.ckr{background:var(--blue-bg);color:var(--blue)}.ccn{background:var(--green-bg);color:var(--green-dk)}.cadm{background:var(--purple-bg);color:var(--purple)}
.tlangs{display:flex;gap:3px;background:var(--gray);border-radius:var(--r);padding:3px}
.tlb{padding:3px 9px;border-radius:5px;border:none;background:transparent;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;color:var(--text2)}
.tlb.on{background:var(--white);color:var(--text);border:1px solid var(--border)}
.sp{flex:1}
.blogout{padding:6px 14px;border:1px solid var(--border);border-radius:var(--r);background:transparent;font-size:12px;cursor:pointer;font-family:inherit;color:var(--text2)}
.blogout:hover{background:var(--gray)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:196px;border-right:1px solid var(--border);background:var(--white);display:flex;flex-direction:column;flex-shrink:0}
.nsec{padding:10px 14px 4px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.ni{padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text2);border-left:2px solid transparent;display:flex;align-items:center;gap:8px}
.ni.on{color:var(--green);border-left-color:var(--green);background:var(--green-bg);font-weight:600}
.ni:hover:not(.on){background:var(--gray)}
.content{flex:1;overflow:auto;padding:20px}
.sfoot{padding:12px 14px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:auto}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-size:15px;font-weight:600}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.slbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.sval{font-size:22px;font-weight:700}
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--white);font-size:12px;cursor:pointer;font-family:inherit;color:var(--text);display:inline-flex;align-items:center;gap:5px;font-weight:500}
.btn:hover{background:var(--gray)}
.bprimary{background:var(--green);color:#fff;border-color:var(--green)}.bprimary:hover{background:var(--green-dk)}
.bamber{background:var(--amber);color:#fff;border-color:var(--amber)}.bamber:hover{background:#854F0B}
.bpurple{background:var(--purple);color:#fff;border-color:var(--purple)}.bpurple:hover{background:#3C3489}
.bdanger{color:var(--red);border-color:#F09595;background:transparent}.bdanger:hover{background:var(--red-bg)}
.bsm{padding:4px 10px;font-size:11px}
.tw{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--gray)}
th{padding:9px 12px;text-align:left;font-weight:600;color:var(--text2);white-space:nowrap;border-bottom:1px solid var(--border);font-size:11px}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray)}
.lb2{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;background:var(--purple-bg);color:var(--purple);font-family:monospace}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.sp0{background:var(--blue-bg);color:var(--blue)}
.sp1{background:var(--purple-bg);color:var(--purple)}
.sp2{background:#FAEEDA;color:#633806}
.sp3{background:#EAF3DE;color:#3B6D11}
.sp4{background:var(--green-bg);color:var(--green-dk)}
.slow{background:var(--amber-bg);color:var(--amber)}
.sout{background:var(--red-bg);color:var(--red)}
.sok{background:#EAF3DE;color:#3B6D11}
.pipe{display:flex;align-items:center;gap:0;margin-bottom:16px;overflow-x:auto}
.pb{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;white-space:nowrap}
.pa{font-size:14px;color:var(--text3);padding:0 5px}
.abox{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;border:1px solid}
.ablue{background:var(--blue-bg);color:var(--blue);border-color:#B5D4F4}
.aamber{background:var(--amber-bg);color:var(--amber);border-color:#FAC775}
.fbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fbar input,.fbar select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:inherit;background:var(--white);color:var(--text)}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.ibox{background:var(--gray);border-radius:var(--r);padding:10px 12px;font-size:12px;margin-bottom:12px;color:var(--text2);border:1px solid var(--border)}
.supc{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px}
.sch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.scn{font-size:14px;font-weight:600}
.ftag{display:inline-flex;align-items:center;gap:4px;background:var(--gray);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:12px;margin:2px}
.vpub{font-size:10px;padding:2px 7px;border-radius:10px;background:#EAF3DE;color:#3B6D11;font-weight:600}
.vpriv{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--gray);color:var(--text2);font-weight:600}
.togw{display:flex;align-items:center;gap:8px;margin:8px 0}
.tog{position:relative;width:36px;height:20px;cursor:pointer;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--border);border-radius:20px;transition:.2s}
.tog input:checked+.tsl{background:var(--green)}
.tsl:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.tsl:before{transform:translateX(16px)}
.dcn{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}
.dkr{width:7px;height:7px;border-radius:50%;background:var(--blue);display:inline-block;margin-right:4px}
.hr{padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.hr:last-child{border-bottom:none}
.hm{display:flex;gap:10px;color:var(--text2);margin-bottom:3px;font-size:11px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200}
.mbg.open{display:flex}
.modal{background:var(--white);border-radius:var(--rl);border:1px solid var(--border);width:500px;max-height:88vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mt{font-size:15px;font-weight:600}
.mb{padding:20px}
.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.xbtn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);line-height:1}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style>
</head>
<body>

<div class="lw" id="lw">
  <div class="lc">
    <div class="lh">
      <div class="logo">재고<span>링크</span> StockLink</div>
      <div class="lsub" id="lsub"></div>
    </div>
    <div class="lb">
      <div class="ltabs">
        <div class="ltab on" onclick="slt('kr',this)" id="lt-kr"></div>
        <div class="ltab" onclick="slt('cn',this)" id="lt-cn"></div>
        <div class="ltab" onclick="slt('admin',this)" id="lt-admin"></div>
      </div>
      <div id="lp-kr">
        <div class="fr"><label class="fl" id="lbl-pw-kr"></label><input class="fi" type="password" id="pw-kr" placeholder="korea1234" onkeydown="if(event.key==='Enter')login('kr')"></div>
        <button class="btnl" onclick="login('kr')" id="lbtn-kr"></button>
        <div class="lerr" id="err-kr"></div>
      </div>
      <div id="lp-cn" style="display:none">
        <div class="fr"><label class="fl" id="lbl-trader"></label>
          <select class="fi" id="cn-sel"><option value="" id="cn-sel-ph"></option></select>
        </div>
        <div class="fr"><label class="fl" id="lbl-pw-cn"></label><input class="fi" type="password" id="pw-cn" onkeydown="if(event.key==='Enter')login('cn')"></div>
        <button class="btnl" onclick="login('cn')" id="lbtn-cn"></button>
        <div class="lerr" id="err-cn"></div>
        <div class="lhint" id="lhint-cn"></div>
      </div>
      <div id="lp-admin" style="display:none">
        <div class="fr"><label class="fl" id="lbl-pw-admin"></label><input class="fi" type="password" id="pw-admin" placeholder="admin1234" onkeydown="if(event.key==='Enter')login('admin')"></div>
        <button class="btnl" onclick="login('admin')" id="lbtn-admin"></button>
        <div class="lerr" id="err-admin"></div>
      </div>
    </div>
    <div class="langr">
      <button class="langb on" onclick="setLang('ko')" id="llko">한국어</button>
      <button class="langb" onclick="setLang('en')" id="llen">EN</button>
      <button class="langb" onclick="setLang('zh')" id="llzh">中文</button>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="tlogo">재고<span>링크</span></div>
    <span id="uchip" class="uchip ckr"></span>
    <div class="tlangs">
      <button class="tlb on" onclick="setLang('ko')" id="tlko">한국어</button>
      <button class="tlb" onclick="setLang('en')" id="tlen">EN</button>
      <button class="tlb" onclick="setLang('zh')" id="tlzh">中文</button>
    </div>
    <div class="sp"></div>
    <button class="blogout" onclick="logout()" id="btn-logout"></button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- 모달들 -->
<div class="mbg" id="m-order"><div class="modal">
  <div class="mh"><div class="mt" id="mt-order"></div><button class="xbtn" onclick="cm('m-order')">✕</button></div>
  <div class="mb">
    <div class="ibox" id="order-hint"></div>
    <div class="fr"><label class="fl" id="lbl-no-trader"></label><select class="fi" id="no-trader" onchange="loadOrderItems()"><option value=""></option></select></div>
    <div class="fr"><label class="fl" id="lbl-no-item"></label><select class="fi" id="no-item"><option value=""></option></select></div>
    <div class="fg">
      <div class="fr"><label class="fl" id="lbl-no-qty"></label><input class="fi" type="number" id="no-qty" min="1"></div>
      <div class="fr"><label class="fl" id="lbl-no-del"></label><input class="fi" type="date" id="no-del"></div>
    </div>
    <div class="fr"><label class="fl" id="lbl-no-req"></label><input class="fi" id="no-req"></div>
    <div class="fr"><label class="fl" id="lbl-no-note"></label><input class="fi" id="no-note"></div>
  </div>
  <div class="mf"><button class="btn" onclick="cm('m-order')" id="btn-cancel1"></button><button class="btn bprimary" onclick="submitOrder()" id="btn-send"></button></div>
</div></div>

<div class="mbg" id="m-confirm"><div class="modal">
  <div class="mh"><div class="mt" id="mt-confirm"></div><button class="xbtn" onclick="cm('m-confirm')">✕</button></div>
  <div class="mb">
    <div class="ibox" id="confirm-info"></div>
    <div class="fr"><label class="fl" id="lbl-co-fac"></label><select class="fi" id="co-fac"><option value=""></option></select></div>
    <div class="fg">
      <div class="fr"><label class="fl" id="lbl-co-start"></label><input class="fi" type="date" id="co-start"></div>
      <div class="fr"><label class="fl" id="lbl-co-end"></label><input class="fi" type="date" id="co-end"></div>
    </div>
    <div class="fr"><label class="fl" id="lbl-co-lot"></label><input class="fi" id="co-lot" placeholder="260501"></div>
    <div class="fr"><label class="fl" id="lbl-co-note"></label><input class="fi" id="co-note"></div>
  </div>
  <div class="mf"><button class="btn" onclick="cm('m-confirm')" id="btn-cancel2"></button><button class="btn bamber" onclick="confirmOrder()" id="btn-confirm"></button></div>
</div></div>

<div class="mbg" id="m-start"><div class="modal">
  <div class="mh"><div class="mt" id="mt-start"></div><button class="xbtn" onclick="cm('m-start')">✕</button></div>
  <div class="mb">
    <div class="ibox" id="start-info"></div>
    <div class="fr"><label class="fl" id="lbl-sp-date"></label><input class="fi" type="date" id="sp-date"></div>
    <div class="fr"><label class="fl" id="lbl-sp-note"></label><input class="fi" id="sp-note"></div>
  </div>
  <div class="mf"><button class="btn" onclick="cm('m-start')" id="btn-cancel3"></button><button class="btn bpurple" onclick="startProd()" id="btn-start"></button></div>
</div></div>

<div class="mbg" id="m-complete"><div class="modal">
  <div class="mh"><div class="mt" id="mt-complete"></div><button class="xbtn" onclick="cm('m-complete')">✕</button></div>
  <div class="mb">
    <div class="ibox" id="complete-info"></div>
    <div class="fg">
      <div class="fr"><label class="fl" id="lbl-cp-qty"></label><input class="fi" type="number" id="cp-qty" min="1"></div>
      <div class="fr"><label class="fl" id="lbl-cp-date"></label><input class="fi" type="date" id="cp-date"></div>
    </div>
    <div class="fr"><label class="fl" id="lbl-cp-note"></label><input class="fi" id="cp-note"></div>
  </div>
  <div class="mf"><button class="btn" onclick="cm('m-complete')" id="btn-cancel4"></button><button class="btn bprimary" onclick="completeProd()" id="btn-complete"></button></div>
</div></div>

<div class="mbg" id="m-sup"><div class="modal">
  <div class="mh"><div class="mt" id="mt-sup"></div><button class="xbtn" onclick="cm('m-sup')">✕</button></div>
  <div class="mb">
    <div class="fg">
      <div class="fr"><label class="fl" id="lbl-as-code"></label><input class="fi" id="as-code" placeholder="HISN"></div>
      <div class="fr"><label class="fl" id="lbl-as-name"></label><input class="fi" id="as-name"></div>
    </div>
    <div class="fr"><label class="fl" id="lbl-as-pw"></label><input class="fi" type="password" id="as-pw"></div>
    <div class="togw">
      <label class="tog"><input type="checkbox" id="as-show" checked><span class="tsl"></span></label>
      <span id="lbl-as-show"></span>
    </div>
    <div id="as-fw" class="fr">
      <label class="fl" id="lbl-as-fac"></label>
      <div style="display:flex;gap:6px;margin-bottom:6px">
        <input class="fi" id="as-fi" style="flex:1" placeholder="공장명">
        <button class="btn" onclick="addFac()" id="btn-addfac"></button>
      </div>
      <div id="as-ftags" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    </div>
  </div>
  <div class="mf"><button class="btn" onclick="cm('m-sup')" id="btn-cancel5"></button><button class="btn bprimary" onclick="saveSup()" id="btn-save1"></button></div>
</div></div>

<div class="mbg" id="m-item"><div class="modal">
  <div class="mh"><div class="mt" id="mt-item"></div><button class="xbtn" onclick="cm('m-item')">✕</button></div>
  <div class="mb">
    <div class="fg">
      <div class="fr"><label class="fl" id="lbl-ai-code"></label><input class="fi" id="ai-code" placeholder="F08W"></div>
      <div class="fr"><label class="fl" id="lbl-ai-name"></label><input class="fi" id="ai-name"></div>
    </div>
    <div class="fg">
      <div class="fr"><label class="fl" id="lbl-ai-size"></label><input class="fi" id="ai-size" placeholder="600*600"></div>
      <div class="fr"><label class="fl" id="lbl-ai-trader"></label><select class="fi" id="ai-trader" onchange="aiLoadFac()"><option value=""></option></select></div>
    </div>
    <div id="ai-fr" class="fr" style="display:none">
      <label class="fl" id="lbl-ai-fac"></label>
      <select class="fi" id="ai-fac"><option value=""></option></select>
    </div>
    <div class="fg">
      <div class="fr"><label class="fl" id="lbl-ai-min"></label><input class="fi" type="number" id="ai-min" value="5"></div>
      <div class="fr"><label class="fl">CNY/<span id="lbl-boxes2"></span></label><input class="fi" type="number" id="ai-price"></div>
    </div>
  </div>
  <div class="mf"><button class="btn" onclick="cm('m-item')" id="btn-cancel6"></button><button class="btn bprimary" onclick="saveItem()" id="btn-save2"></button></div>
</div></div>

<script>
// ═══════════════════════════════════════════════
// 로컬스토리지 기반 - 서버 없이 동작
// 실제 운영 시 Supabase/Cloudflare D1으로 교체
// ═══════════════════════════════════════════════

const KR_PW='korea1234', ADMIN_PW='admin1234';
const SK={sup:'sl_sup',items:'sl_items',orders:'sl_orders',prods:'sl_prods',lots:'sl_lots',hist:'sl_hist'};

let lang='ko', session=null, newFacs=[], activeOid=null;
let DB={sup:[],items:[],orders:[],prods:[],lots:[],hist:[]};

// ─ i18n ────────────────────────────────────────
const L={
  ko:{
    lsub:'중국-한국 실시간 재고 공유 시스템',
    tab_kr:'🇰🇷 한국',tab_cn:'🇨🇳 중국',tab_admin:'⚙ 관리자',
    pw:'비밀번호',login:'로그인',logout:'로그아웃',
    sel_trader:'무역업체 선택',sel_trader_ph:'-- 업체 선택 --',
    demo_cn:'데모: HISN→hisn1234 / JF→jf1234',
    err_pw:'비밀번호가 올바르지 않습니다.',err_sel:'무역업체를 선택하세요.',

  const sel=document.getElementById('cn-sel');

function login(role){
  const errEl=document.getElementById('err-'+role);errEl.textContent='';
  if(role==='kr'){
    if(document.getElementById('pw-kr').value!==KR_PW){errEl.textContent=t('err_pw');return;}
    session={role:'kr'};
  }else if(role==='admin'){
    if(document.getElementById('pw-admin').value!==ADMIN_PW){errEl.textContent=t('err_pw');return;}
    session={role:'admin'};
  }else{
    const sid=document.getElementById('cn-sel').value;
    const pw=document.getElementById('pw-cn').value;
    if(!sid){errEl.textContent=t('err_sel');return;}
    const sup=getSup(sid);
    if(!sup||sup.password!==pw){errEl.textContent=t('err_pw');return;}
    session={role:'cn',sid:sup.id,scode:sup.code,sname:sup.name};
  }
  document.getElementById('lw').style.display='none';
  document.getElementById('app').classList.add('show');
  buildUI();
}
function logout(){
  session=null;
  document.getElementById('lw').style.display='';
  document.getElementById('app').classList.remove('show');
  ['pw-kr','pw-cn','pw-admin'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

function buildSidebar(){
  const r=session.role;
  const ni=(icon,key,page)=>`<div class="ni" onclick="showPage('${page}',this)">${icon} ${t(key)}</div>`;
  let h=`<div class="nsec">${t('nav_dash')}</div>`;
  h+=ni('▦','nav_dash','dashboard');
  h+=ni('↗','nav_orders','orders');
  if(r==='cn'||r==='admin')h+=ni('⚙','nav_prod','production');
  h+=ni('☰','nav_inv','inventory');
  if(r==='admin'){h+=`<div class="nsec"></div>`;h+=ni('🏭','nav_sup','suppliers');h+=ni('📦','nav_items','items');}
  h+=ni('◷','nav_hist','history');
  h+=`<div style="flex:1"></div><div class="sfoot">${new Date().toLocaleTimeString()}</div>`;
  document.getElementById('sidebar').innerHTML=h;
}
function showPage(key,navEl){
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('on'));
  if(navEl)navEl.classList.add('on');
  else{const el=document.querySelector(`.ni[onclick="showPage('${key}',this)"]`);if(el)el.classList.add('on');}
  ({dashboard:pageDash,orders:pageOrders,production:pageProd,inventory:pageInv,suppliers:pageSup,items:pageItems,history:pageHist}[key]||pageDash)();
}

function pageDash(){
  const sid=session.sid||null;
  const ords=sid?DB.orders.filter(o=>o.sid===sid):DB.orders;
  const pending=ords.filter(o=>o.status==='pending').length;
  const inprog=ords.filter(o=>['scheduled','producing'].includes(o.status)).length;
  const done=ords.filter(o=>o.status==='done').length;
  const myItems=sid?DB.items.filter(i=>i.supId===sid):DB.items;
  const totalStock=myItems.reduce((s,i)=>s+stock(i.id),0);
  let alerts='';
  if(pending>0&&session.role==='cn')alerts+=`<div class="abox ablue">${t('alert_p')} (${pending})</div>`;
  if(ords.filter(o=>o.status==='producing').length>0)alerts+=`<div class="abox aamber">${t('alert_pr')}</div>`;
  const recOrd=ords.slice(0,5).map(o=>`<tr><td>${supCode(o.sid)}</td><td style="font-weight:600">${o.iname}</td><td>${o.qty}${t('boxes')}</td><td>${statusPill(o.status)}</td></tr>`).join('')||`<tr><td colspan="4" class="empty">—</td></tr>`;
  const myProds=sid?DB.prods.filter(p=>p.sid===sid):DB.prods;
  const actProd=myProds.filter(p=>['scheduled','producing'].includes(p.status)).slice(0,4)
    .map(p=>`<tr><td>${supCode(p.sid)}</td><td style="font-weight:600">${p.iname}</td><td><span class="lb2">${p.lot}</span></td><td>${statusPill(p.status)}</td></tr>`).join('')||`<tr><td colspan="4" class="empty">—</td></tr>`;
  document.getElementById('content').innerHTML=`
    ${alerts}
    <div class="sgrid">
      <div class="sc"><div class="slbl">${t('dash_p')}</div><div class="sval" style="color:var(--blue)">${pending}</div></div>
      <div class="sc"><div class="slbl">${t('dash_i')}</div><div class="sval" style="color:var(--amber)">${inprog}</div></div>
      <div class="sc"><div class="slbl">${t('dash_d')}</div><div class="sval" style="color:var(--purple)">${done}</div></div>
      <div class="sc"><div class="slbl">${t('dash_s')}</div><div class="sval" style="color:var(--green)">${totalStock}<span style="font-size:13px;font-weight:400"> ${t('boxes')}</span></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:16px">
      <div>
        <div class="sh"><div class="st">${t('nav_orders')}</div>${session.role==='kr'?`<button class="btn bprimary" onclick="openOrder()">+ ${t('new_order')}</button>`:''}</div>
        <div class="tw"><table><thead><tr><th>${t('col_trader')}</th><th>${t('col_item')}</th><th>${t('col_qty')}</th><th>${t('col_status')}</th></tr></thead><tbody>${recOrd}</tbody></table></div>
      </div>
      <div>
        <div class="sh"><div class="st">${t('nav_prod')}</div></div>
        <div class="tw"><table><thead><tr><th>${t('col_trader')}</th><th>${t('col_item')}</th><th>${t('col_lot')}</th><th>${t('col_status')}</th></tr></thead><tbody>${actProd}</tbody></table></div>
      </div>
    </div>`;
}

// ─ 주문 ─────────────────────────────────────────
function pageOrders(){
  const sid=session.sid||null;
  const ords=(sid?DB.orders.filter(o=>o.sid===sid):DB.orders).slice().sort((a,b)=>b.at.localeCompare(a.at));
  const cnt={pending:0,scheduled:0,producing:0,done:0,stocked:0};
  ords.forEach(o=>{if(cnt[o.status]!==undefined)cnt[o.status]++;});
  const pipe=['pending','scheduled','producing','done','stocked'].map((s,i,a)=>
    `<span class="pb sp${i}">${t({pending:'sp',scheduled:'ss',producing:'spr',done:'sd',stocked:'sst'}[s])} <strong>${cnt[s]}</strong></span>${i<a.length-1?'<span class="pa">→</span>':''}`).join('');
  const rows=ords.map(o=>{
    let act='';
    if(session.role==='cn'){
      if(o.status==='pending')act=`<button class="btn bamber bsm" onclick="openConfirm('${o.id}')">${t('confirm_sched')}</button>`;
      else if(o.status==='scheduled')act=`<button class="btn bpurple bsm" onclick="openStart('${o.id}')">${t('start_prod')}</button>`;
      else if(o.status==='producing')act=`<button class="btn bprimary bsm" onclick="openComplete('${o.id}')">${t('complete_prod')}</button>`;
    }
    return`<tr><td style="font-size:11px">${o.at}</td><td style="font-size:11px;font-weight:600">${supCode(o.sid)}</td><td style="font-size:11px;color:var(--text2)">${facDisp(o.sid,o.fac)}</td><td style="font-weight:600">${o.iname}</td><td>${o.qty}${t('boxes')}</td><td>${statusPill(o.status)}</td><td style="font-size:11px;color:var(--text2)">${o.note||'—'}</td><td>${act||'—'}</td></tr>`;
  }).join('')||`<tr><td colspan="8" class="empty">—</td></tr>`;
  document.getElementById('content').innerHTML=`
    <div class="sh"><div class="st">${t('nav_orders')}</div>${session.role==='kr'?`<button class="btn bprimary" onclick="openOrder()">+ ${t('new_order')}</button>`:''}</div>
    <div class="pipe">${pipe}</div>
    <div class="tw"><table><thead><tr><th>${t('col_date')}</th><th>${t('col_trader')}</th><th>${t('col_fac')}</th><th>${t('col_item')}</th><th>${t('col_qty')}</th><th>${t('col_status')}</th><th>${t('col_note')}</th><th>${t('col_action')}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ─ 생산 ─────────────────────────────────────────
function pageProd(){
  const sid=session.sid||null;
  const prods=(sid?DB.prods.filter(p=>p.sid===sid):DB.prods).slice().sort((a,b)=>b.sp.localeCompare(a.sp));
  const rows=prods.map(p=>{
    let act='';
    if(session.role==='cn'||session.role==='admin'){
      if(p.status==='scheduled')act=`<button class="btn bpurple bsm" onclick="openStart('${p.oid}')">${t('start_prod')}</button>`;
      else if(p.status==='producing')act=`<button class="btn bprimary bsm" onclick="openComplete('${p.oid}')">${t('complete_prod')}</button>`;
    }
    return`<tr><td><span class="lb2">${p.lot}</span></td><td style="font-size:11px">${supCode(p.sid)}</td><td style="font-size:11px;color:var(--text2)">${facDisp(p.sid,p.fac)}</td><td style="font-weight:600">${p.iname}</td><td>${p.qty}${t('boxes')}</td><td style="font-size:11px">${p.sp}</td><td style="font-size:11px">${p.ep}</td><td>${statusPill(p.status)}</td><td>${act||'—'}</td></tr>`;
  }).join('')||`<tr><td colspan="9" class="empty">—</td></tr>`;
  document.getElementById('content').innerHTML=`
    <div class="sh"><div class="st">${t('nav_prod')}</div></div>
    <div class="tw"><table><thead><tr><th>${t('col_lot')}</th><th>${t('col_trader')}</th><th>${t('col_fac')}</th><th>${t('col_item')}</th><th>${t('col_qty')}</th><th>${t('prod_start')}</th><th>${t('prod_end')}</th><th>${t('col_status')}</th><th>${t('col_action')}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ─ 재고 ─────────────────────────────────────────
function pageInv(){
  const sid=session.sid||null;
  const items=sid?DB.items.filter(i=>i.supId===sid):DB.items;
  const rows=items.map(i=>{
    const s=getSup(i.supId);
    const fd=session.role==='kr'?(s&&s.showFactory&&i.fac?i.fac:t('no_fac')):(i.fac||'—');
    const st=stock(i.id);const status=st===0?'out':st<i.min?'low':'ok';
    return`<tr><td style="font-family:monospace;font-size:11px">${i.code}</td><td style="font-weight:600">${i.name}</td><td>${i.size}</td><td style="font-size:11px">${s?s.code:'—'}</td><td style="font-size:11px;color:var(--text2)">${fd}</td><td style="font-weight:700">${st}</td><td>${i.min}</td><td>${statusPill(status)}</td></tr>`;
  }).join('')||`<tr><td colspan="8" class="empty">—</td></tr>`;
  document.getElementById('content').innerHTML=`
    <div class="sh"><div class="st">${t('nav_inv')}</div></div>
    <div class="tw"><table><thead><tr><th>${t('col_code')}</th><th>${t('col_item')}</th><th>${t('col_size')}</th><th>${t('col_trader')}</th><th>${t('col_fac')}</th><th>${t('col_stock')}</th><th>${t('col_min')}</th><th>${t('col_status')}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ─ 업체 관리 ─────────────────────────────────────
function pageSup(){
  const cards=DB.sup.map(s=>`
    <div class="supc">
      <div class="sch">
        <div><span class="scn">${s.code}</span><span style="font-size:12px;color:var(--text2);margin-left:8px">${s.name}</span><span class="${s.showFactory?'vpub':'vpriv'}" style="margin-left:8px">${s.showFactory?t('vis_pub'):t('vis_priv')}</span></div>
        <button class="btn bdanger bsm" onclick="delSup('${s.id}')">✕</button>
      </div>
      <div>${s.showFactory?(s.factories||[]).map(f=>`<span class="ftag">🏭 ${f}</span>`).join(''):`<span style="font-size:12px;color:var(--text3);font-style:italic">${t('no_fac')}</span>`}</div>
    </div>`).join('')||`<div class="empty">—</div>`;
  document.getElementById('content').innerHTML=`
    <div class="sh"><div class="st">${t('nav_sup')}</div><button class="btn bprimary" onclick="om('m-sup')">+ ${t('add_trader')}</button></div>
    ${cards}`;
}

// ─ 품목 관리 ─────────────────────────────────────
function pageItems(){
  const rows=DB.items.map(i=>{
    const s=getSup(i.supId);
    return`<tr><td style="font-family:monospace;font-size:11px">${i.code}</td><td style="font-weight:600">${i.name}</td><td>${i.size}</td><td style="font-size:11px">${s?s.code:'—'}</td><td style="font-size:11px;color:var(--text2)">${s&&s.showFactory?i.fac:'—'}</td><td>${i.min}</td><td><button class="btn bdanger bsm" onclick="delItem('${i.id}')">✕</button></td></tr>`;
  }).join('')||`<tr><td colspan="7" class="empty">—</td></tr>`;
  document.getElementById('content').innerHTML=`
    <div class="sh"><div class="st">${t('nav_items')}</div><button class="btn bprimary" onclick="prepItem();om('m-item')">+ ${t('add_item')}</button></div>
    <div class="tw"><table><thead><tr><th>${t('col_code')}</th><th>${t('col_item')}</th><th>${t('col_size')}</th><th>${t('col_trader')}</th><th>${t('col_fac')}</th><th>${t('col_min')}</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ─ 이력 ─────────────────────────────────────────
function pageHist(){
  const sid=session.sid||null;
  const hist=(sid?DB.hist.filter(h=>h.sid===sid||!h.sid):DB.hist).slice().reverse();
  const rows=hist.map(h=>`
    <div class="hr">
      <div class="hm"><span><span class="${h.actor==='cn'?'dcn':'dkr'}"></span>${h.actor==='cn'?t('cn_a'):t('kr_a')}</span><span>${h.at}</span><span style="font-weight:600">${t(h.type)||h.type}</span></div>
      <div>${h.text}</div>
    </div>`).join('')||`<div class="empty">—</div>`;
  document.getElementById('content').innerHTML=`
    <div class="sh"><div class="st">${t('nav_hist')}</div></div>
    <div class="tw" style="padding:0 16px">${rows}</div>`;
}

// ─ 주문 액션 ─────────────────────────────────────
function openOrder(){
  document.getElementById('no-trader').innerHTML=`<option value="">${t('sel_t')}</option>`+DB.sup.map(s=>`<option value="${s.id}">${s.code} – ${s.name}</option>`).join('');
  document.getElementById('no-item').innerHTML=`<option value="">${t('sel_i')}</option>`;
  ['no-qty','no-req','no-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('no-del').value='';
  om('m-order');applyLang();
}
function loadOrderItems(){
  const tid=document.getElementById('no-trader').value;
  const filtered=tid?DB.items.filter(i=>i.supId===tid):[];
  document.getElementById('no-item').innerHTML=`<option value="">${t('sel_i')}</option>`+filtered.map(i=>`<option value="${i.id}" data-n="${i.name}" data-s="${i.size}">${i.name} (${i.code})</option>`).join('');
}
function submitOrder(){
  const tid=document.getElementById('no-trader').value;
  const iOpt=document.getElementById('no-item');
  const iid=iOpt.value;const qty=parseInt(document.getElementById('no-qty').value)||0;
  if(!tid||!iid||qty<1){alert(t('err_order'));return;}
  const sel=iOpt.options[iOpt.selectedIndex];
  const o={id:'O'+uid(),iid,iname:sel.dataset.n,size:sel.dataset.s,sid:tid,fac:'',qty,
    req:document.getElementById('no-req').value,del:document.getElementById('no-del').value,
    note:document.getElementById('no-note').value,status:'pending',pid:'',at:today()};
  DB.orders.push(o);sv('orders');
  DB.hist.push({type:'ht_order',actor:'kr',sid:tid,text:`${o.iname} ${o.qty}${t('boxes')} (${supCode(tid)})`,at:today()});sv('hist');
  cm('m-order');pageOrders();
}

function openConfirm(oid){
  activeOid=oid;
  const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  const sup=getSup(o.sid);
  document.getElementById('confirm-info').innerHTML=`<strong>${o.iname}</strong> | ${o.qty}${t('boxes')} | ${sup?sup.code:''} | ${t('col_del')}: ${o.del||'—'}`;
  document.getElementById('co-fac').innerHTML=`<option value="">${t('sel_f')}</option>`+(sup?sup.factories:[]).map(f=>`<option value="${f}">${f}</option>`).join('');
  document.getElementById('co-start').value=today();
  ['co-end','co-lot','co-note'].forEach(id=>document.getElementById(id).value='');
  om('m-confirm');applyLang();
}
function confirmOrder(){
  const lot=document.getElementById('co-lot').value.trim();
  const s=document.getElementById('co-start').value,e=document.getElementById('co-end').value;
  if(!lot||!s||!e){alert(t('err_confirm'));return;}
  const o=DB.orders.find(x=>x.id===activeOid);
  const fac=document.getElementById('co-fac').value||'';
  const p={id:'P'+uid(),oid:o.id,iid:o.iid,iname:o.iname,sid:o.sid,fac,qty:o.qty,lot,sp:s,ep:e,as:'',ae:'',status:'scheduled'};
  DB.prods.push(p);o.status='scheduled';o.pid=p.id;o.fac=fac;
  sv('prods');sv('orders');
  DB.hist.push({type:'ht_confirm',actor:'cn',sid:o.sid,text:`${o.iname} → ${fac||'—'} (${lot})`,at:today()});sv('hist');
  cm('m-confirm');pageOrders();
}

function openStart(oid){
  activeOid=oid;
  const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  document.getElementById('start-info').innerHTML=`<strong>${o.iname}</strong> | ${o.qty}${t('boxes')} | ${facDisp(o.sid,o.fac)}`;
  document.getElementById('sp-date').value=today();document.getElementById('sp-note').value='';
  om('m-start');applyLang();
}
function startProd(){
  const o=DB.orders.find(x=>x.id===activeOid);
  const p=DB.prods.find(x=>x.id===o.pid);
  o.status='producing';if(p){p.status='producing';p.as=document.getElementById('sp-date').value;}
  sv('orders');sv('prods');
  DB.hist.push({type:'ht_start',actor:'cn',sid:o.sid,text:`${o.iname} 생산 시작`,at:today()});sv('hist');
  cm('m-start');pageProd();
}

function openComplete(oid){
  activeOid=oid;
  const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  document.getElementById('complete-info').innerHTML=`<strong>${o.iname}</strong> | ${t('ordered')}: ${o.qty}${t('boxes')}`;
  document.getElementById('cp-qty').value=o.qty;document.getElementById('cp-date').value=today();document.getElementById('cp-note').value='';
  om('m-complete');applyLang();
}
function completeProd(){
  const qty=parseInt(document.getElementById('cp-qty').value)||0;
  const date=document.getElementById('cp-date').value;
  if(!qty||!date){alert(t('err_complete'));return;}
  const o=DB.orders.find(x=>x.id===activeOid);
  const p=DB.prods.find(x=>x.id===o.pid);
  o.status='done';if(p){p.status='done';p.ae=date;p.aq=qty;}
  DB.lots.push({id:'L'+uid(),iid:o.iid,lot:p?p.lot:'',qty,remain:qty,date});
  sv('orders');sv('prods');sv('lots');
  DB.hist.push({type:'ht_complete',actor:'cn',sid:o.sid,text:`${o.iname} ${qty}${t('boxes')} 생산완료→재고`,at:today()});sv('hist');
  cm('m-complete');pageProd();
}

// ─ 업체/품목 관리 ─────────────────────────────────
document.getElementById('as-show').addEventListener('change',function(){document.getElementById('as-fw').style.display=this.checked?'':'none';});
function addFac(){const inp=document.getElementById('as-fi');const n=inp.value.trim();if(!n)return;if(!newFacs.includes(n))newFacs.push(n);inp.value='';renderFacTags();}
function renderFacTags(){document.getElementById('as-ftags').innerHTML=newFacs.map(f=>`<span class="ftag">🏭 ${f} <span style="cursor:pointer;margin-left:4px" onclick="rmFac('${f}')">✕</span></span>`).join('');}
function rmFac(n){newFacs=newFacs.filter(f=>f!==n);renderFacTags();}
function saveSup(){
  const code=document.getElementById('as-code').value.trim();
  const name=document.getElementById('as-name').value.trim();
  const pw=document.getElementById('as-pw').value;
  if(!code||!name||!pw){alert(t('err_sup'));return;}
  const show=document.getElementById('as-show').checked;
  DB.sup.push({id:'SUP'+uid(),code,name,password:pw,showFactory:show,factories:show?[...newFacs]:[]});
  sv('sup');newFacs=[];['as-code','as-name','as-pw'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('as-ftags').innerHTML='';cm('m-sup');pageSup();
}
function delSup(id){const s=getSup(id);if(!confirm(`${s.code} 삭제?`))return;DB.sup=DB.sup.filter(x=>x.id!==id);sv('sup');pageSup();}

function prepItem(){
  document.getElementById('ai-trader').innerHTML=`<option value=""></option>`+DB.sup.map(s=>`<option value="${s.id}">${s.code} – ${s.name}</option>`).join('');
  document.getElementById('ai-fr').style.display='none';
}
function aiLoadFac(){
  const tid=document.getElementById('ai-trader').value;const sup=getSup(tid);
  const row=document.getElementById('ai-fr');const sel=document.getElementById('ai-fac');
  if(sup&&sup.showFactory&&(sup.factories||[]).length){row.style.display='';sel.innerHTML=`<option value=""></option>`+sup.factories.map(f=>`<option value="${f}">${f}</option>`).join('');}
  else row.style.display='none';
}
function saveItem(){
  const code=document.getElementById('ai-code').value.trim();const name=document.getElementById('ai-name').value.trim();
  if(!code||!name){alert(t('err_item'));return;}
  DB.items.push({id:'I'+uid(),code,name,size:document.getElementById('ai-size').value||'600*600',supId:document.getElementById('ai-trader').value,fac:document.getElementById('ai-fac').value||'',min:parseInt(document.getElementById('ai-min').value)||5});
  sv('items');cm('m-item');pageItems();
}
function delItem(id){if(!confirm('삭제?'))return;DB.items=DB.items.filter(x=>x.id!==id);sv('items');pageItems();}

function om(id){document.getElementById(id).classList.add('open');}
function cm(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mbg').forEach(m=>m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');}));

// ─ 초기화 ───────────────────────────────────────
load();
setLang('ko');
</script>
</body>
</html>
